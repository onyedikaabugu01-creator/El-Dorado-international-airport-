<!DOCTYPE html>
<html>
<head>
<title>Track Shipment - Lusyfer Global Shipping</title>
</head>

<body>

<h1>Lusyfer Shipment Tracking</h1>

<p>Enter your tracking number:</p>

<input type="text" placeholder="Tracking number">

<button>Track</button>

<p>Your shipment status will appear here.</p>
<script>

function trackPackage(){

    let number = document.getElementById("trackingNumber").value;

    let savedNumber = localStorage.getItem("trackingNumber");
    let status = localStorage.getItem("status");
    let details = localStorage.getItem("details");

    if(number === savedNumber){

        document.getElementById("result").innerHTML =
        "Tracking Number: " + savedNumber +
        "<br>Status: " + status +
        "<br>Details: " + details;

    } else {

        document.getElementById("result").innerHTML =
        "Tracking number not found.";

    }

}

</script>
</body>
</html>
