<!DOCTYPE html>
<html>
<head>

<title>Lusyfer Admin Control Center</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    padding:20px;
}

.container{
    background:white;
    max-width:500px;
    margin:auto;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

h1{
    text-align:center;
    color:#003366;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#0059b3;
    color:white;
    border:none;
    border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>Lusyfer Control Center</h1>

<h3>Add Shipment</h3>

<label>Tracking Number</label>
<input id="trackingNumber" type="text" placeholder="Enter tracking number">

<label>Customer Name</label>
<input id="customerName" type="text" placeholder="Customer name">

<label>Shipment Status</label>
<select id="status">
<option>Processing</option>
<option>Shipped</option>
<option>In Transit</option>
<option>Delivered</option>
</select>

<label>Shipment Details</label>
<textarea id="details" placeholder="Enter package details"></textarea>

<label>Package Picture</label>
<input id="picture" type="file">

<button onclick="saveShipment()">
Save Shipment
</button>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://mlgnfcjqqckptpmcbick.supabase.co";

const SUPABASE_KEY = "PASTE_YOUR_PUBLISHABLE_KEY_HERE";


const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);


async function saveShipment(){

    let tracking = document.getElementById("trackingNumber").value;
    let customer = document.getElementById("customerName").value;
    let status = document.getElementById("status").value;
    let details = document.getElementById("details").value;


    if(tracking === ""){
        alert("Please enter a tracking number");
        return;
    }


    const { error } = await supabaseClient
    .from("shipments")
    .insert([
        {
            tracking_number: tracking,
            customer_name: customer,
            status: status,
            details: details
        }
    ]);


    if(error){

        alert("Error saving shipment");
        console.log(error);

    } else {

        alert("Shipment saved successfully!");

        document.getElementById("trackingNumber").value="";
        document.getElementById("customerName").value="";
        document.getElementById("details").value="";

    }

}

</script>

</body>
</html>
